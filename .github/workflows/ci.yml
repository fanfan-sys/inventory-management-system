# 🏗️ CI 流水线 - 代码质量检查
# 触发条件: push 到 main/master, 或创建 Pull Request
name: CI - Lint & Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 同一分支的多次推送只保留最新一次运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 代码质量检查 ─────────────────────────────────────────
  lint:
    name: 🔍 ESLint 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 安装依赖
        run: bun install --frozen-lockfile

      - name: 🔍 运行 ESLint
        run: bun run lint
        continue-on-error: true

  # ─── 构建检查 ────────────────────────────────────────────
  build:
    name: 🏗️ 构建检查
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 安装依赖
        run: bun install --frozen-lockfile

      - name: 🗄️ 初始化数据库 Schema
        run: |
          mkdir -p db
          touch db/custom.db
          bunx prisma generate
          bunx prisma db push --skip-generate

      - name: 🏗️ 构建项目
        run: bun run build
        env:
          DATABASE_URL: file:./db/custom.db

  # ─── 测试结果汇总 ────────────────────────────────────────
  ci-result:
    name: ✅ CI 结果汇总
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()
    steps:
      - name: 📊 检查所有任务结果
        run: |
          echo "========================================="
          echo "  CI Pipeline 结果汇总"
          echo "========================================="
          echo "  ESLint 检查:  ${{ needs.lint.result == 'success' && '✅ 通过' || needs.lint.result == 'failure' && '❌ 失败' || '⚠️ 跳过' }}"
          echo "  构建检查:    ${{ needs.build.result == 'success' && '✅ 通过' || needs.build.result == 'failure' && '❌ 失败' || '⚠️ 跳过' }}"
          echo "========================================="

          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ CI 失败，请检查上方错误信息"
            exit 1
          fi
          echo "🎉 所有检查通过！"
